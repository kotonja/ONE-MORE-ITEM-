name: Phase 01 Node Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/phase-01-grid-foundation

permissions:
  contents: read

jobs:
  phase01-node-validation:
    name: Phase 01 Node Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Studio synchronization smoke test
        run: node tools/test_studio_blueprint.mjs
