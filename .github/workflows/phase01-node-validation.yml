name: Phase 01–06 Node Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'codex/**'

permissions:
  contents: read

jobs:
  node-validation:
    name: Phase 01–06 Node Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Run Phase 01 Studio synchronization smoke test
        run: node tools/test_studio_blueprint.mjs

      - name: Run Phase 02 typed instance authoring smoke test
        run: node tools/test_phase02_blueprint.mjs

      - name: Run Phase 03 cross-platform smoke test
        run: node tools/test_phase03_cross_platform.mjs

      - name: Run Phase 04 multiplayer arena smoke test
        run: node tools/test_phase04_multiplayer_arena.mjs

      - name: Run Phase 05 persistent progression smoke test
        run: node tools/test_phase05_persistent_progression.mjs

      - name: Run Phase 06 onboarding, starter missions, and analytics smoke test
        run: node tools/test_phase06_onboarding_missions_analytics.mjs
