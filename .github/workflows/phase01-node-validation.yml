name: Phase 01 and Phase 02 Node Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'codex/**'

permissions:
  contents: read

jobs:
  node-validation:
    name: Phase 01 and Phase 02 Node Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Phase 01 Studio synchronization smoke test
        run: node tools/test_studio_blueprint.mjs

      - name: Run Phase 02 typed instance authoring smoke test
        run: node tools/test_phase02_blueprint.mjs
